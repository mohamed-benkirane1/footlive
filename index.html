<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KoraLive – Streaming Football</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       HEADER
  ══════════════════════════════════════ -->
  <header class="header">
    <div class="header__brand">
      <span class="header__icon">⚽</span>
      <span class="header__name">Kora<span class="accent">Live</span></span>
    </div>
    <div class="header__badge">🌍 Coupe du Monde 2026</div>
    <button class="btn-refresh-top" id="btnRefresh" title="Actualiser">↻</button>
  </header>

  <!-- ══════════════════════════════════════
       MATCHS DU JOUR
  ══════════════════════════════════════ -->
  <main class="main">
    <div class="section-header">
      <h1 class="section-title">Matchs du Jour</h1>
    </div>
    <div class="matches-grid" id="matchesGrid">
      <p class="state-msg">Chargement des matchs…</p>
    </div>
  </main>

  <!-- ══════════════════════════════════════
       OVERLAY (fond sombre)
  ══════════════════════════════════════ -->
  <div class="overlay" id="overlay"></div>

  <!-- ══════════════════════════════════════
       PANEL STREAMS (slide depuis la droite)
  ══════════════════════════════════════ -->
  <aside class="stream-panel" id="streamPanel" aria-hidden="true">
    <div class="panel-header">
      <h2 class="panel-title" id="streamPanelTitle">📺 Streams disponibles</h2>
      <button class="btn-icon" id="btnCloseStreams" title="Fermer">✕</button>
    </div>
    <p class="panel-match-name" id="panelMatchName"></p>
    <ul class="stream-list" id="streamList">
      <li class="state-msg">Chargement…</li>
    </ul>
  </aside>

  <!-- ══════════════════════════════════════
       SCRIPTS (ordre : matches → streams → player)
  ══════════════════════════════════════ -->
  <script src="js/matches.js"></script>
  <script src="js/streams.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
